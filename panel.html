<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ClipShelf</title>
    <style>
		:root {
			--ink: #1f2933;
			--muted: #5c6674;
			--line: #d8e3f3;
			--card: rgba(255, 255, 255, 0.78);
			--accent: #0f766e;
			--accent-strong: #0b5e58;
			--danger: #c2410c;
		}

		*, *::before, *::after {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 0;
			color: var(--ink);
			font-family: "Avenir Next", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
			background: linear-gradient(155deg, #fff8ec 0%, #eef5ff 52%, #f4fff9 100%);
			height: 100vh;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

		#app-container {
            padding: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
		}

		.section {
			border: 1px solid var(--line);
            border-radius: 10px;
            padding: 6px;
			background: var(--card);
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
		}

        .section.scrollable {
            flex: 1 1 0;
            min-height: 0;
        }

		.section-title {
            margin: 0 0 4px;
            font-size: 12px;
			color: var(--muted);
			font-weight: 700;
            flex-shrink: 0;
		}

		.inline-row {
			display: flex;
			align-items: center;
            gap: 6px;
		}

        .active-group-row {
            justify-content: space-between;
        }

        .active-group-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex: 1;
        }

        .active-group-actions {
            display: flex;
            gap: 4px;
        }

		.input, .rename-input {
			flex: 1;
			border: 1px solid #cdd8e9;
			border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
			color: var(--ink);
			background: rgba(255, 255, 255, 0.92);
		}

		.btn {
			border: 1px solid transparent;
			border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
			font-weight: 700;
			cursor: pointer;
			color: #fff;
			background: var(--accent);
			white-space: nowrap;
		}
		.btn:hover { background: var(--accent-strong); }
		.btn.secondary { background: #e2e8f0; color: #334155; border-color: #cbd5e1; }
		.btn.secondary:hover { background: #d6deea; }
		.btn.danger { background: var(--danger); }
		.btn.danger:hover { background: #9a3412; }

		.group-list {
			display: grid;
            gap: 4px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            align-content: start;
		}

		.group-item {
			border: 1px solid #d5dfef;
			background: rgba(255, 255, 255, 0.9);
			border-radius: 8px;
            padding: 6px;
			display: flex;
            justify-content: space-between;
            align-items: center;
			cursor: pointer;
		}
		.group-item:hover { border-color: #9fb5d4; background: rgba(255, 255, 255, 0.98); }

		.group-name { font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.count-pill { font-size: 11px; border-radius: 999px; padding: 2px 8px; background: rgba(15, 118, 110, 0.14); color: #0b5e58; font-weight: 700; margin-left: 6px; }
		
        .group-controls { display: flex; gap: 4px; }

		.thumb-grid {
			display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 6px;
        }

        .thumb-scroll {
            overflow-y: auto;
            flex: 1;
            min-height: 0;
		}

		.thumb-item {
			position: relative;
			border: 1px solid #d6deea;
			border-radius: 8px;
			overflow: hidden;
			background: #ffffff;
			cursor: pointer;
		}

		.thumb-item img {
			width: 100%;
            height: 90px;
			object-fit: cover;
			display: block;
		}

		.thumb-meta {
			display: block;
            padding: 4px;
            font-size: 10px;
			color: #64748b;
			white-space: nowrap;
		}

		.thumb-delete {
			position: absolute;
			top: 4px;
			right: 4px;
			width: 24px;
			height: 24px;
			border-radius: 999px;
			border: 1px solid rgba(255, 255, 255, 0.75);
			background: rgba(15, 23, 42, 0.76);
			color: #fff;
			font-weight: 700;
			cursor: pointer;
			display: grid;
			place-items: center;
		}
		.thumb-delete:hover { background: rgba(194, 65, 12, 0.95); }

		.empty { color: var(--muted); font-size: 12px; margin: 0; }
		.status-error { border: 1px solid rgba(194, 65, 12, 0.3); color: #9a3412; background: rgba(255, 237, 213, 0.8); border-radius: 6px; padding: 6px; font-size: 12px; font-weight: 600; margin-bottom: 6px; }

		.lightbox { position: fixed; inset: 0; background: rgba(8, 15, 29, 0.72); display: grid; place-items: center; padding: 20px; }
		.lightbox-inner { position: relative; width: min(88vw, 980px); max-height: 86vh; border-radius: 14px; overflow: hidden; background: #fff; border: 1px solid #d6deea; }
		.lightbox-image { width: 100%; height: auto; max-height: 86vh; object-fit: contain; display: block; }
		.lightbox-close { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 999px; background: rgba(15, 23, 42, 0.76); color: #fff; border: none; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app-container">
        <p class="empty">読み込み中...</p>
    </div>
    <script src="panel.js"></script>
</body>
</html>
